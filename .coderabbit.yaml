# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: ko

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - '!build/**'
    - '!**/.gradle/**'
    - '!**/generated/**'

  path_instructions:
    - path: 'src/main/java/com/realdev/readle/domain/**'
      instructions: |
        다음 아키텍처와 JPA 규칙 위반만 지적한다.
        - Controller는 Repository를 직접 의존하지 않고 Entity를 API 응답으로 반환하지 않는다.
        - Service가 트랜잭션 경계를 관리하며, 조회에는 @Transactional(readOnly = true)를 사용한다.
        - Entity는 Controller, DTO, Config, Security, Web 계층에 의존하지 않는다.
        - 연관관계는 지연 로딩을 우선하고 Enum은 EnumType.STRING으로 저장한다.

    - path: 'src/main/java/com/realdev/readle/**/entity/**'
      instructions: |
        - Lombok @Data와 Entity의 @Setter 사용을 지적한다.
        - 기본 생성자는 protected를 우선하고, 상태 변경 메서드는 의도가 드러나야 한다.
        - DB 컬럼/테이블 이름은 snake_case, Java 필드는 camelCase를 따른다.

    - path: 'src/main/java/com/realdev/readle/**/controller/**'
      instructions: |
        - Request/Response DTO를 분리하고 입력 DTO에 Bean Validation(@Valid)을 적용하는지 확인한다.
        - 외부 사용자 식별자는 내부 PK가 아닌 memberUuid를 사용하는지 확인한다.
        - 내부 예외, Stack Trace, AI 원문을 응답에 노출하지 않는지 확인한다.

    - path: 'src/main/java/com/realdev/readle/**/auth/**'
      instructions: |
        - Refresh Token 원문 저장·로그 기록을 지적한다. MySQL에는 해시와 만료/폐기 상태만 저장한다.
        - Redis를 Refresh Token 저장소로 추가하지 않는다.
        - OAuth Token, JWT, 개인정보가 로그·예외 응답에 포함되지 않는지 확인한다.

    - path: 'src/main/java/com/realdev/readle/**/{content,quiz,ai}/**'
      instructions: |
        - 사용자 원문과 AI 응답은 모두 신뢰하지 않는다. 사용자 원문은 데이터로만 전달하고 시스템 지시와 분리한다.
        - 정적 가드레일 실패, 알 수 없는 enum/필드, JSON 스키마 검증 실패는 서버가 안전하게 실패 또는 정해진 재시도 정책으로 처리해야 한다.
        - AI 호출을 장시간 DB 트랜잭션 안에서 수행하지 않는다.
        - AI 내부 프롬프트, 채점 기준, 정답 원문은 외부 API 응답에 노출하지 않는다.
        - 퀴즈 문제 수는 1~5개, 콘텐츠 태그는 1~3개 범위를 벗어나지 않아야 한다.

    - path: 'src/main/java/com/realdev/readle/infra/ai/**'
      instructions: |
        - AI 호출은 Client 계층에만 두고 Controller/Entity에서 직접 호출하지 않는다.
        - AI 요청·응답 DTO와 서비스 API DTO를 분리하고, AI 응답을 검증한 뒤에만 저장한다.

    - path: 'src/main/resources/db/migration/**'
      instructions: |
        - Flyway migration은 이미 적용된 파일을 수정하지 않고 새 forward migration을 추가한다.
        - 데이터 손실 가능성이 있는 변경, 인덱스 누락, 기존 데이터와 호환되지 않는 NOT NULL 추가를 지적한다.

    - path: 'src/test/**'
      instructions: |
        - 핵심 비즈니스 규칙, 실패 경로, 상태 전환을 검증하는 테스트가 있는지 확인한다.
        - 외부 AI API는 실제 호출 대신 Mock/Stub을 사용해야 한다.

    - path: '{build.gradle,compose.yaml,src/main/resources/**}'
      instructions: |
        - 비밀번호, API Key, OAuth/JWT 비밀값을 하드코딩하거나 커밋 가능한 설정 파일에 넣는 변경을 지적한다.
        - prod AWS 인증은 EC2 IAM Role을 사용하므로 access key/secret key를 추가하지 않는다.
        - 기본 인프라에 Redis를 추가하는 변경은 MVP 결정과 충돌한다.
