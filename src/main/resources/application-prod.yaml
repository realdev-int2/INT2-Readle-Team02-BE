spring:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    baseline-on-migrate: false
  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:1}

  cloud:
    aws:
      region:
        static: ap-northeast-2

management:
  health:
    redis:
      enabled: false

  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,prometheus

  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        readiness:
          include: readinessState,db

readle:
  storage:
    s3:
      bucket: ${S3_BUCKET}

security:
  prometheus-metrics:
    enabled: ${PROMETHEUS_METRICS_ENABLED:false}
    root-password: ${PROMETHEUS_METRICS_ROOT_PASSWORD:}
