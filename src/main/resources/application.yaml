spring:
  application:
    name: readle

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8 # 스크립트 인코딩 설정

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        # Canonical server time authority for point_history.created_at etc. is Asia/Seoul (KST).
        jdbc:
          time_zone: Asia/Seoul

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

anthropic:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    version: "2023-06-01"
    model: claude-sonnet-5
    base-url: https://api.anthropic.com
