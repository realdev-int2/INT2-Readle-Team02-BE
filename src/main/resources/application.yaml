spring:
  application:
    name: readle

  profiles:
    default: local

  config:
    import: optional:file:.env[.properties]

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        # Canonical server time authority for point_history.created_at etc. is Asia/Seoul (KST).
        jdbc:
          time_zone: Asia/Seoul

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
