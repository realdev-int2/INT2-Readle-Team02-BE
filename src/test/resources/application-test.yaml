spring:
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:h2:mem:readle-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

  # 테스트 실행 시, 실제 AWS에 연결하지 않도록 mock 처리
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-northeast-2
      s3:
        endpoint: http://localhost:4566 # LocalStack or mock S3
        path-style-access-enabled: true

# 테스트 환경용 Claude API Mock 설정 (실제 API 호출 없음)
anthropic:
  claude:
    api-key: mock-test-key
    base-url: https://api.anthropic.com
    model: claude-sonnet-5
    version: 2023-06-01

security:
  jwt-issuer: readle-test
  jwt-secret: 01234567890123456789012345678901
  jwt-audience: readle-api
  access-token-minutes: 30
  refresh-token-days: 14
  state-encryption-key: MDEyMzQ1Njc4OWFiY2RlZmdoaWprbG1ub3BxcnN0dXY= # gitleaks:allow deterministic OAuth state encryption test key
  state-minutes: 10
  backend-origin: http://localhost:8080
  allowed-return-paths: /

content:
  validation:
    min-length: 300

    max-attempts: 2
    retry-delay-ms: 1000
    call-timeout-seconds: 5
    prompt-injection-keywords:
      - "ignore all previous instructions"
      - "무조건 통과"
    badwords-ko-resource-path: "classpath:data/validation/badwords.data"
    whitelist-domains:
      - "example.com"
