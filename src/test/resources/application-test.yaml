spring:
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:h2:mem:readle-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true

  # 테스트 실행 시, 실제 AWS에 연결하지 않도록 mock 처리
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-northeast-2
      s3:
        endpoint: http://localhost:4566 # LocalStack or mock S3
        path-style-access-enabled: true

# 테스트 환경용 Claude API Mock 설정 (실제 API 호출 없음)
anthropic:
  claude:
    api-key: mock-test-key
    base-url: https://api.anthropic.com
    model: claude-sonnet-5
    version: 2023-06-01
