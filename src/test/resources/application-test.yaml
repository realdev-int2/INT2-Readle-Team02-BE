spring:
  datasource:
    url: jdbc:h2:mem:readle-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # H2를 MySQL처럼 사용하기 위한 설정
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

  flyway:
    enabled: true

  # 테스트 실행 시, 실제 AWS에 연결하지 않도록 mock 처리
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: ap-northeast-2
      s3:
        endpoint: http://localhost:4566 # LocalStack or mock S3
        path-style-access-enabled: true
